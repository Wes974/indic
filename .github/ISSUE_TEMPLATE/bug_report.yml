name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version or commit are you running?
      placeholder: "v0.2.0, or commit 04c19f6"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 25, Ubuntu 24.04, Debian 12..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Start indic with `cargo run -- serve`
        2. Open `http://127.0.0.1:8080`
        3. Look up `...`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages or screenshots.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (redact secrets)
      description: |
        Relevant parts of your `.env` — **never** include actual API keys.
        Just show which vars are set.
      placeholder: |
        INDIC_TOKEN=***
        SHODAN_API_KEY=*** (present)
        VIRUSTOTAL_API_KEY=* (absent)
