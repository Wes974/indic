name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  # Le front n'est pas couvert par cargo : build.rs se contente d'inliner les
  # fichiers, donc une erreur de syntaxe dans app.js passe la CI au vert et
  # déploie une page morte. Ce job est la seule barrière côté web.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Syntaxe JS
        run: node --check src/web/app.js
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build du binaire (servi à Playwright)
        run: cargo build
      - name: Dépendances e2e
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Tests e2e
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
