    "ftp.port": 21,
    "ftp.banner": "220 FTP server ready.",

    "http.enabled": true,
    "http.port": 80,
    "http.banner": "Apache/2.4.41 (Ubuntu)",
    "http.skin": "basicLogin",

    "mysql.enabled": true,
